name: data-heroes-notification-preferences-system

services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: preferences-db
      POSTGRES_USER: pg-user
      POSTGRES_PASSWORD: pg-password
    ports:
      - "127.0.0.1:6666:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pg-user -d preferences-db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pg-user:pg-password@postgres:5432/preferences-db
    volumes:
      - .:/app
      - /app/node_modules
      - /app/src/generated
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
